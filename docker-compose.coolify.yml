services:
  frontend-client:
    image: ${FRONTEND_CLIENT_IMAGE:-fitpilot-frontend-client:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/}
    # ports:
    #   - "${FRONTEND_CLIENT_PORT:-4173}:80"
    expose:
      - "4173"
    restart: unless-stopped
    networks:
      coolify:
        aliases:
          - fitpilot-client-frontend
      default:
        aliases:
          - fitpilot-client-frontend

networks:
  coolify:
    external: true
  default:
    driver: bridge
